<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escalones con bandera</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
<a-scene background="color: yellow">

    <a-camera position="0 6 18"></a-camera>
    
    <a-box position="0 -0.5 -18"
           width="25"
           height="1"
           depth="30"
           color="yellow">
    </a-box>

    <a-box position="0 0.5 -5"  width="4" height="1"  depth="2" color="red"></a-box>

    <a-box position="0 1 -7"    width="4" height="2"  depth="2" color="blue"></a-box>

    <a-box position="0 1.5 -9"  width="4" height="3"  depth="2" color="yellow"></a-box>

    <a-box position="0 2 -11"   width="4" height="4"  depth="2" color="purple"></a-box>

    <a-box position="0 2.5 -13" width="4" height="5"  depth="2" color="green"></a-box>

    <a-box position="0 3 -15"   width="4" height="6"  depth="2" color="orange"></a-box>

    <a-box position="0 3.5 -17" width="4" height="7"  depth="2" color="pink"></a-box>

    <a-box position="0 4 -19"   width="4" height="8"  depth="2" color="cyan"></a-box>

    <a-box position="0 4.5 -21" width="4" height="9"  depth="2" color="black"></a-box>

    <a-box position="0 5 -23"   width="4" height="10" depth="2" color="white"></a-box>

    <a-box position="-0.6 11.8 -23.0" width="0.4" height="0.4" depth="0.2" color="green"></a-box>
    <a-box position="0    11.8 -22.8" width="0.4" height="0.4" depth="0.2" color="white"></a-box>
    <a-box position="0.6  11.8 -23.0" width="0.4" height="0.4" depth="0.2" color="red"></a-box>

    <a-box position="-0.6 11.4 -22.8" width="0.4" height="0.4" depth="0.2" color="green"></a-box>
    <a-box position="0    11.4 -23.0" width="0.4" height="0.4" depth="0.2" color="white"></a-box>
    <a-box position="0.6  11.4 -22.8" width="0.4" height="0.4" depth="0.2" color="red"></a-box>

    <a-box position="-0.6 11.0 -23.0" width="0.4" height="0.4" depth="0.2" color="green"></a-box>
    <a-box position="0    11.0 -22.8" width="0.4" height="0.4" depth="0.2" color="white"></a-box>
    <a-box position="0.6  11.0 -23.0" width="0.4" height="0.4" depth="0.2" color="red"></a-box>

    <a-cylinder
        position="-1 10.75 -23"
        radius="0.05"
        height="2.5"
        color="gray">
    </a-cylinder>

   <a-text
        value="¡VIVA MEXICO!"
        position="0 13.2 -23"
        color="black"
        align="center"
            scale="3 3 3">
    </a-text>

</a-scene>
</body>
</html>
